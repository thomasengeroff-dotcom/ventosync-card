# .github/ISSUE_TEMPLATE/feature_request.yml
name: ✨ Feature Request
description: Suggest a new feature or improvement
labels: ["enhancement"]
body:
  - type: textarea
    id: description
    attributes:
      label: Describe the feature
      placeholder: What should the card do?
    validations:
      required: true

  - type: textarea
    id: usecase
    attributes:
      label: Use case
      placeholder: Why is this useful? What problem does it solve?
    validations:
      required: true

  - type: textarea
    id: mockup
    attributes:
      label: Mockup / Sketch
      placeholder: Optional – drag & drop an image showing how it could look