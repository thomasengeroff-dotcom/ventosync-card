# .github/workflows/release.yml
# Triggered when you push a tag like v1.0.0
# Validates (lint + HACS), builds, and creates a GitHub Release
# HACS automatically picks up new releases for update notifications

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # ── Step 1: Lint & Build Check ────────────────────────────
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build check
        run: npm run build

  # ── Step 2: HACS Validation ───────────────────────────────
  validate-hacs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: HACS Validation
        uses: hacs/action@main
        with:
          category: plugin

  # ── Step 3: Build & Release (only after lint + HACS pass) ─
  release:
    needs: [lint, validate-hacs]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: "echo \"version=$(echo $GITHUB_REF_NAME | sed 's/^v//')\" >> $GITHUB_OUTPUT"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## VentoSync Card v${{ steps.version.outputs.version }}

            ### Installation
            **HACS:** Add this repository as a custom repository (Frontend).
            **Manual:** Copy `dist/ventosync-card.js` to your `/config/www/` folder.
          files: |
            dist/ventosync-card.js
          generate_release_notes: true