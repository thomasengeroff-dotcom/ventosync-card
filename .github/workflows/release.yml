# .github/workflows/release.yml
# Triggered when you push a tag like v1.0.0
# Builds the bundle and creates a GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Get version from tag
        id: version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "v${{ steps.version.outputs.version }}"
          body: |
            ## VentoSync Card v${{ steps.version.outputs.version }}

            ### Installation
            **HACS:** Add this repository as a custom repository (Frontend).
            **Manual:** Copy `dist/ventosync-card.js` to your `/config/www/` folder.
          files: |
            dist/ventosync-card.js
          generate_release_notes: true